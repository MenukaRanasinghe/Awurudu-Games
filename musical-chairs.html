<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪑 Musical Chairs</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;width:100vw;overflow:hidden;font-family:'Nunito',sans-serif;background:#1e1b4b}
canvas{display:block;width:100%;height:100%}
.back{position:fixed;top:12px;left:12px;z-index:100;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);
  color:#fff;border-radius:12px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;backdrop-filter:blur(6px);text-decoration:none;transition:.2s}
.back:hover{background:rgba(0,0,0,.6)}
.overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);backdrop-filter:blur(10px)}
.overlay.show{display:flex}
.card{background:linear-gradient(145deg,#1e1b4b,#312e81);border:2px solid rgba(255,255,255,.12);border-radius:28px;
  padding:clamp(20px,4vw,40px);text-align:center;max-width:440px;width:92%;color:#e2e8f0;
  box-shadow:0 20px 60px rgba(0,0,0,.5);animation:pop .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.card h2{font-family:'Baloo 2',cursive;font-size:26px;color:#f472b6;margin:8px 0}
.card p{font-size:13px;color:#94a3b8;line-height:1.6}
.card .big{font-size:56px}
.btn{font-family:'Nunito',sans-serif;font-weight:700;border:none;border-radius:14px;padding:12px 28px;
  font-size:15px;cursor:pointer;transition:.2s;margin:6px}
.btn:hover{transform:scale(1.04)}
.btn-p{background:linear-gradient(135deg,#f472b6,#a78bfa);color:#fff}
.btn-o{background:transparent;border:2px solid rgba(255,255,255,.15);color:#94a3b8}
.res{text-align:left;margin-top:14px;background:rgba(255,255,255,.05);border-radius:14px;padding:14px}
.res h4{font-size:11px;color:#a78bfa;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:700}
.res-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.res-row .n{font-weight:700}
.res-row .s{font-family:'Baloo 2',cursive}
.res-row.out{opacity:.4;text-decoration:line-through}
.confetti{position:fixed;z-index:55;pointer-events:none;animation:cfall var(--f,3s) ease-in forwards}
@keyframes cfall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(var(--r,720deg))}}
</style>
</head>
<body>
<a class="back" href="index.html">← Home</a>
<canvas id="c"></canvas>
<div class="overlay" id="overlay"><div class="card" id="card"></div></div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const players=JSON.parse(sessionStorage.getItem('players')||'[]');
if(players.length<2){document.getElementById('card').innerHTML=`<div class="big">⚠️</div><h2>Need Players!</h2><p>Go back and add at least 2 players.</p><a href="index.html" class="btn btn-p" style="text-decoration:none;display:inline-block">← Dashboard</a>`;document.getElementById('overlay').classList.add('show')}

const COLORS=['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16'];
let state='ready'; // ready, walking, stopped, claiming, roundEnd, gameOver
let alivePlayers=[], chairs=[], walkers=[], sittingMap={};
let roundNum=0, elimHistory=[];
let musicStopTime=0, stopTimeout=null;
let walkAngle=0, walkSpeed=0.6;
let audioCtx=null, osc=null, melodyInt=null;
let pressOrder=[];
let discoAngle=0;
let pulsePhase=0;

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

function initGame(){
  alivePlayers=players.map((p,i)=>({...p,color:COLORS[i%COLORS.length],idx:i}));
  roundNum=0;elimHistory=[];
  showRoundStart();
}

function setupRound(){
  const n=alivePlayers.length;
  const numChairs=n-1;
  chairs=[];
  const cx=canvas.width/2,cy=canvas.height/2;
  const radius=Math.min(cx,cy)*0.32;
  for(let i=0;i<numChairs;i++){
    const a=(i/numChairs)*Math.PI*2-Math.PI/2;
    chairs.push({x:cx+Math.cos(a)*radius, y:cy+Math.sin(a)*radius, angle:a, claimed:false, claimedBy:null});
  }
  walkers=alivePlayers.map((p,i)=>({...p,walkIdx:i,seated:false,seatTarget:null}));
  walkAngle=0;
  pressOrder=[];
  sittingMap={};
}

function showRoundStart(){
  setupRound();
  const card=document.getElementById('card');
  const n=alivePlayers.length;
  card.innerHTML=`
    <div class="big">🪑</div>
    <h2>${n===2?'Final Round!':'Round '+(roundNum+1)}</h2>
    <p>${n} players, ${n-1} chair${n-1>1?'s':''}!<br>
    When music stops, press your key FAST to grab a chair!<br>Slowest player is OUT!</p>
    <div style="margin:12px 0;font-size:13px;color:#a78bfa">
      ${alivePlayers.map(p=>`<b style="color:${p.color}">[${p.key}]</b> ${p.name}`).join(' &nbsp; ')}
    </div>
    <button class="btn btn-p" onclick="startWalking()">▶ Play Music!</button>
    ${roundNum>0?`<p style="font-size:11px;color:#64748b;margin-top:8px">${elimHistory.length} eliminated so far</p>`:''}
  `;
  document.getElementById('overlay').classList.add('show');
}

function startWalking(){
  roundNum++;
  state='walking';
  document.getElementById('overlay').classList.remove('show');
  startAudio();
  // Random stop 3-7 seconds
  const delay=3000+Math.random()*4000;
  stopTimeout=setTimeout(stopMusic,delay);
}

function startAudio(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const gain=audioCtx.createGain();gain.gain.value=0.12;gain.connect(audioCtx.destination);
    osc=audioCtx.createOscillator();osc.type='square';osc.frequency.value=440;osc.connect(gain);osc.start();
    const notes=[523,587,659,698,784,698,659,587];let ni=0;
    melodyInt=setInterval(()=>{if(osc)osc.frequency.value=notes[ni%notes.length];ni++},200);
  }catch(e){}
}

function stopAudio(){
  try{if(osc){osc.stop();osc=null}clearInterval(melodyInt)}catch(e){}
}

function stopMusic(){
  if(state!=='walking')return;
  state='stopped';
  stopAudio();
  musicStopTime=performance.now();
  // Auto-timeout 3s
  stopTimeout=setTimeout(autoResolve,3000);
}

// Key handler
document.addEventListener('keydown',e=>{
  const k=e.key.toUpperCase();
  if(state==='ready'&&k===' '){startWalking();return}
  if(state==='stopped'){
    const w=walkers.find(w=>w.key===k&&!w.seated);
    if(w&&!pressOrder.find(o=>o.key===k)){
      const rt=performance.now()-musicStopTime;
      pressOrder.push({...w,reactionTime:rt});
      claimChair(w);
      // Check if all pressed or N-1 chairs filled
      const seated=walkers.filter(w2=>w2.seated).length;
      if(seated>=chairs.length){
        clearTimeout(stopTimeout);
        setTimeout(endRound,800);
      }
    }
  }
});

function claimChair(w){
  // Find nearest unclaimed chair
  let best=null,bestD=Infinity;
  chairs.forEach(ch=>{
    if(ch.claimed)return;
    const d=Math.hypot(canvas.width/2-ch.x,canvas.height/2-ch.y); // just take any available
    if(!best||!ch.claimed){best=ch;bestD=d}
  });
  // Actually just take first unclaimed
  const ch=chairs.find(c=>!c.claimed);
  if(!ch)return;
  ch.claimed=true;ch.claimedBy=w.name;
  w.seated=true;w.seatTarget=ch;
}

function autoResolve(){
  // Everyone who hasn't pressed yet
  walkers.forEach(w=>{
    if(!w.seated){
      pressOrder.push({...w,reactionTime:3000});
      const ch=chairs.find(c=>!c.claimed);
      if(ch){ch.claimed=true;ch.claimedBy=w.name;w.seated=true;w.seatTarget=ch;}
    }
  });
  setTimeout(endRound,600);
}

function endRound(){
  state='roundEnd';
  const loser=walkers.find(w=>!w.seated);
  if(!loser){
    // Edge case: the last in pressOrder is the loser equivalent
    const last=pressOrder[pressOrder.length-1];
    // Remove from alive
    alivePlayers=alivePlayers.filter(p=>p.key!==last.key);
    elimHistory.push({name:last.name,reaction:last.reactionTime,round:roundNum});
  }else{
    alivePlayers=alivePlayers.filter(p=>p.key!==loser.key);
    const po=pressOrder.find(o=>o.key===loser.key);
    elimHistory.push({name:loser.name,reaction:po?po.reactionTime:3000,round:roundNum});
  }
  
  if(alivePlayers.length<=1){
    state='gameOver';
    setTimeout(showGameOver,500);
  }else{
    setTimeout(showRoundResult,500);
  }
}

function showRoundResult(){
  const elim=elimHistory[elimHistory.length-1];
  const sorted=[...pressOrder].sort((a,b)=>a.reactionTime-b.reactionTime);
  const card=document.getElementById('card');
  card.innerHTML=`
    <div class="big">🪑</div>
    <h2>Round ${roundNum} Over!</h2>
    <p style="color:#f87171;font-weight:700;font-size:16px;margin:6px 0">
      ${elim.name} is OUT! ${elim.reaction>=3000?'(Too slow!)':'('+elim.reaction.toFixed(0)+'ms)'}
    </p>
    <div class="res"><h4>Reaction Times</h4>
      ${sorted.map((r,i)=>`<div class="res-row ${r.name===elim.name?'out':''}">
        <span class="n" style="color:${r.color}">${i===0?'⚡ ':''}${r.name}</span>
        <span class="s" style="color:${i===0?'#34d399':r.name===elim.name?'#f87171':'#94a3b8'}">${r.reactionTime>=3000?'DNF':r.reactionTime.toFixed(0)+'ms'}</span>
      </div>`).join('')}
    </div>
    <p style="font-size:12px;color:#64748b;margin-top:8px">${alivePlayers.length} players remain</p>
    <button class="btn btn-p" onclick="showRoundStart()">Next Round →</button>
    <a href="index.html" class="btn btn-o" style="text-decoration:none;display:inline-block">Exit</a>
  `;
  document.getElementById('overlay').classList.add('show');
}

function showGameOver(){
  const winner=alivePlayers[0]||{name:'—'};
  confetti();
  const card=document.getElementById('card');
  card.innerHTML=`
    <div class="big">🏆</div>
    <h2>${winner.name} Wins!</h2>
    <p style="color:#fbbf24;font-weight:700;margin:6px 0">Last one with a chair!</p>
    <div class="res"><h4>Elimination Order</h4>
      ${elimHistory.map((e,i)=>`<div class="res-row out">
        <span class="n">Round ${e.round}: ${e.name}</span>
        <span class="s" style="color:#f87171">${e.reaction>=3000?'DNF':e.reaction.toFixed(0)+'ms'}</span>
      </div>`).join('')}
      <div class="res-row"><span class="n" style="color:#fbbf24;font-weight:800">🏆 ${winner.name}</span><span class="s" style="color:#fbbf24">WINNER</span></div>
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-p" onclick="replay()">🔄 Play Again</button>
      <a href="index.html" class="btn btn-o" style="text-decoration:none;display:inline-block">Home</a>
    </div>
  `;
  document.getElementById('overlay').classList.add('show');
}

function replay(){
  stopAudio();clearTimeout(stopTimeout);
  document.getElementById('overlay').classList.remove('show');
  alivePlayers=players.map((p,i)=>({...p,color:COLORS[i%COLORS.length],idx:i}));
  roundNum=0;elimHistory=[];state='ready';
  showRoundStart();
}

// ─── DRAW ───
let lastT=performance.now();
function loop(){
  const now=performance.now(),dt=Math.min((now-lastT)/1000,0.05);lastT=now;
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  
  // Background
  const bg=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*.7);
  bg.addColorStop(0,'#312e81');bg.addColorStop(0.5,'#1e1b4b');bg.addColorStop(1,'#0f0a2e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  
  // Disco lights
  pulsePhase+=dt*2;
  if(state==='walking'){
    const pulse=Math.sin(pulsePhase)*0.3+0.5;
    [['#f472b6',w*.2,h*.3],['#818cf8',w*.8,h*.3],['#fbbf24',w*.5,h*.15],['#34d399',w*.5,h*.8]].forEach(([col,x,y])=>{
      const g=ctx.createRadialGradient(x,y,0,x,y,150);
      g.addColorStop(0,col+'30');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.globalAlpha=pulse*0.4;
      ctx.fillRect(x-150,y-150,300,300);
    });
    ctx.globalAlpha=1;
  }
  
  // Floor circle
  const cx=w/2,cy=h/2;
  const floorR=Math.min(cx,cy)*0.5;
  ctx.fillStyle='rgba(255,255,255,0.03)';
  ctx.beginPath();ctx.arc(cx,cy,floorR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=2;ctx.stroke();
  
  // Title
  ctx.font="bold 18px 'Baloo 2'";ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('🪑 Musical Chairs — Round '+roundNum,w/2,30);
  
  // Status text
  if(state==='walking'){
    ctx.font="bold 24px 'Baloo 2'";ctx.fillStyle='#34d399';
    ctx.fillText('🎵 Music Playing...',w/2,h-40);
  }else if(state==='stopped'){
    const flash=Math.sin(performance.now()*0.01)>0;
    ctx.font="bold 28px 'Baloo 2'";ctx.fillStyle=flash?'#f87171':'#fbbf24';
    ctx.fillText('🛑 GRAB A CHAIR!',w/2,h-40);
  }
  
  // Draw chairs
  const chairR=Math.min(cx,cy)*0.32;
  chairs.forEach((ch,i)=>{
    const cAngle=(i/chairs.length)*Math.PI*2-Math.PI/2;
    ch.x=cx+Math.cos(cAngle)*chairR;
    ch.y=cy+Math.sin(cAngle)*chairR;
    
    drawChair(ch.x,ch.y,ch.claimed,ch.claimedBy);
  });
  
  // Walking animation
  if(state==='walking'){
    walkAngle+=dt*walkSpeed;
    const walkR=chairR+50;
    walkers.forEach((wr,i)=>{
      const a=walkAngle+(i/walkers.length)*Math.PI*2;
      const wx=cx+Math.cos(a)*walkR;
      const wy=cy+Math.sin(a)*walkR;
      const legP=performance.now()*0.005+i;
      drawCharacter(wx,wy,wr.color,wr.key,wr.name,legP,false);
    });
  }else if(state==='stopped'||state==='roundEnd'){
    const walkR=chairR+50;
    walkers.forEach((wr,i)=>{
      if(wr.seated&&wr.seatTarget){
        // Draw sitting on chair
        drawCharacter(wr.seatTarget.x,wr.seatTarget.y-18,wr.color,wr.key,wr.name,0,true);
      }else{
        // Standing where they stopped
        const a=walkAngle+(i/walkers.length)*Math.PI*2;
        const wx=cx+Math.cos(a)*walkR;
        const wy=cy+Math.sin(a)*walkR;
        drawCharacter(wx,wy,wr.color,wr.key,wr.name,0,false);
        // Draw "!" if stopped
        if(state==='stopped'){
          ctx.font="bold 20px 'Baloo 2'";ctx.fillStyle='#f87171';ctx.textAlign='center';
          ctx.fillText('❗',wx,wy-40);
        }
      }
    });
  }else if(state==='ready'||state==='gameOver'){
    // Just show alive players in a line
    alivePlayers.forEach((p,i)=>{
      const px=w/2+(i-(alivePlayers.length-1)/2)*60;
      drawCharacter(px,h/2+60,p.color,p.key,p.name,performance.now()*0.003+i,false);
    });
  }
  
  // Keys help bar at bottom
  if(state==='walking'||state==='stopped'){
    ctx.font="bold 11px 'Nunito'";ctx.textAlign='center';
    const helpY=h-12;
    const total=walkers.filter(wr=>!wr.seated).length;
    const startX=w/2-total*30;
    walkers.filter(wr=>!wr.seated).forEach((wr,i)=>{
      const hx=startX+i*60+30;
      ctx.fillStyle=wr.color+'80';
      ctx.fillRect(hx-20,helpY-12,40,18);
      ctx.fillStyle='#fff';
      ctx.fillText(`[${wr.key}] ${wr.name}`,hx,helpY);
    });
  }
  
  requestAnimationFrame(loop);
}

function drawChair(x,y,claimed,claimedBy){
  ctx.save();ctx.translate(x,y);
  
  // Chair shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(0,16,16,5,0,0,Math.PI*2);ctx.fill();
  
  // Chair legs
  ctx.strokeStyle='#92400e';ctx.lineWidth=3;ctx.lineCap='round';
  [[-10,0,-12,18],[10,0,12,18],[-8,4,-6,18],[8,4,6,18]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  
  // Seat
  ctx.fillStyle=claimed?'#34d399':'#d97706';
  ctx.strokeStyle=claimed?'#059669':'#92400e';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(-14,-4,28,10,3);ctx.fill();ctx.stroke();
  
  // Backrest
  ctx.fillStyle=claimed?'#34d399':'#b45309';
  ctx.strokeStyle=claimed?'#059669':'#78350f';
  ctx.beginPath();ctx.roundRect(-12,-20,24,18,3);ctx.fill();ctx.stroke();
  
  // Claimed label
  if(claimed&&claimedBy){
    ctx.font="bold 9px 'Nunito'";ctx.textAlign='center';ctx.fillStyle='#fff';
    ctx.fillText('✓',0,-11);
  }
  
  ctx.restore();
}

function drawCharacter(x,y,color,key,name,legPhase,sitting){
  ctx.save();ctx.translate(x,y);
  
  const bob=sitting?0:Math.sin(legPhase)*3;
  
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();ctx.ellipse(0,20,10,4,0,0,Math.PI*2);ctx.fill();
  
  // Legs
  if(!sitting){
    ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineCap='round';
    const lo=Math.sin(legPhase)*6;
    ctx.beginPath();ctx.moveTo(-3,10);ctx.lineTo(-3+lo,22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,10);ctx.lineTo(3-lo,22);ctx.stroke();
  }
  
  // Body
  ctx.fillStyle=color;
  ctx.beginPath();ctx.roundRect(-7,-2+bob,14,14,4);ctx.fill();
  
  // Head
  ctx.beginPath();ctx.arc(0,-10+bob,9,0,Math.PI*2);ctx.fill();
  
  // Eyes
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-3,-12+bob,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,-12+bob,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-2.5,-12+bob,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3.5,-12+bob,1.5,0,Math.PI*2);ctx.fill();
  
  // Smile
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(0,-8+bob,4,0.2,Math.PI-0.2);ctx.stroke();
  
  // Arms
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-7,2+bob);ctx.lineTo(-12,8+bob);ctx.stroke();
  ctx.beginPath();ctx.moveTo(7,2+bob);ctx.lineTo(12,8+bob);ctx.stroke();
  
  // Key badge
  ctx.font="bold 10px 'Baloo 2'";ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.roundRect(-8,-26+bob,16,12,4);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.fillText(key,0,-17+bob);
  
  // Name
  ctx.font="bold 9px 'Nunito'";ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText(name,0,34);
  
  ctx.restore();
}

// Extend CanvasRenderingContext2D.roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
  }
}

function confetti(){
  const c=['#fbbf24','#f472b6','#34d399','#3b82f6','#ef4444','#a78bfa'];
  for(let i=0;i<45;i++){const d=document.createElement('div');d.className='confetti';const s=Math.random()*8+4;
    Object.assign(d.style,{width:s+'px',height:s*(Math.random()>.5?1:.5)+'px',background:c[~~(Math.random()*c.length)],
      left:Math.random()*100+'vw',top:'-10px',borderRadius:Math.random()>.5?'50%':'2px',
      '--f':(2+Math.random()*2)+'s','--r':(360+Math.random()*720)+'deg',animationDelay:Math.random()*.5+'s'});
    document.body.appendChild(d);setTimeout(()=>d.remove(),4500)}
}

if(players.length>=2) initGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
