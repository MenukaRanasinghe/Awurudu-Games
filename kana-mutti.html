<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏺 Kana Mutti Challenge</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            position: relative
        }

        /* ---------- FESTIVE BACKGROUND ---------- */
        .sky {
            position: fixed;
            inset: 0;
            z-index: -10;
            background:
                radial-gradient(ellipse at 70% 20%, rgba(255, 230, 150, .55), transparent 45%),
                linear-gradient(180deg, #ffc98a 0%, #ffb36b 12%, #ffd89e 24%, #bfe3f5 42%, #87ceeb 62%, #6fb8d9 82%, #4a9740 100%)
        }

        .sun {
            position: fixed;
            top: 8%;
            right: 10%;
            z-index: -9;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #fffde0, #ffd870 50%, #ffa94d 80%, transparent);
            box-shadow: 0 0 70px rgba(255, 220, 120, .8), 0 0 140px rgba(255, 170, 80, .4)
        }

        /* Bunting flags across the top */
        .bunting {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: -8;
            pointer-events: none
        }

        /* Wooden beam */
        .beam {
            position: fixed;
            top: 85px;
            left: 0;
            width: 100%;
            height: 32px;
            z-index: -6;
            background: linear-gradient(180deg, #a06b38 0%, #7c4e21 40%, #5c3712 100%);
            box-shadow: 0 6px 14px rgba(0, 0, 0, .35), inset 0 2px 0 rgba(255, 255, 255, .12)
        }

        .beam::before,
        .beam::after {
            content: '';
            position: absolute;
            top: 0;
            width: 26px;
            height: 32px;
            background: linear-gradient(180deg, #8b5527, #4a2810);
            box-shadow: inset 0 0 8px rgba(0, 0, 0, .5)
        }

        .beam::before {
            left: -4px;
            border-right: 2px solid #3a1e08
        }

        .beam::after {
            right: -4px;
            border-left: 2px solid #3a1e08
        }

        /* Distant tree line */
        .trees-far {
            position: fixed;
            bottom: 14%;
            left: 0;
            width: 100%;
            height: 18%;
            z-index: -7;
            opacity: .55;
            pointer-events: none
        }

        /* Ground */
        .ground {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 14%;
            z-index: -5;
            background: linear-gradient(180deg, #72b84f 0%, #4e8c33 60%, #2d5e1c 100%);
            box-shadow: inset 0 8px 16px rgba(0, 0, 0, .2)
        }

        /* ---------- UI ---------- */
        .back {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, .45);
            border: 1px solid rgba(255, 255, 255, .25);
            color: #fff;
            border-radius: 12px;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 13px;
            text-decoration: none;
            backdrop-filter: blur(6px);
            transition: .2s
        }

        .back:hover {
            background: rgba(0, 0, 0, .6)
        }

        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 14px 20px 4px
        }

        .header h1 {
            font-family: 'Baloo 2', cursive;
            font-size: clamp(24px, 4.5vw, 38px);
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 10px rgba(120, 60, 20, .6), 0 0 20px rgba(0, 0, 0, .3);
            letter-spacing: .5px
        }

        .header .sub {
            font-size: clamp(12px, 2vw, 15px);
            color: #fff8e0;
            font-weight: 600;
            margin-top: 2px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, .5)
        }

        /* ---------- POTS SCENE ---------- */
        .scene {
            position: relative;
            z-index: 5;
            width: 100%;
            height: calc(100vh - 90px);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 30px 3vw 0;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><rect x='17' y='4' width='6' height='34' rx='2' fill='%238b5a2b' stroke='%235c3712' stroke-width='1.5'/><rect x='17' y='4' width='6' height='6' fill='%23c89060'/></svg>") 20 4, pointer
        }

        .pot-hanger {
            position: relative;
            width: clamp(90px, 14vw, 150px);
            margin-top: 0;
            transform-origin: top center;
            animation: sway var(--dur, 3s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
            transition: filter .2s
        }

        .pot-hanger:hover {
            filter: brightness(1.1) drop-shadow(0 0 12px rgba(255, 220, 120, .6))
        }

        .pot-hanger.broken {
            animation: none;
            pointer-events: none
        }

        .pot-hanger.shaking .pot-svg {
            animation: shake .35s ease-in-out
        }

        @keyframes sway {

            0%,
            100% {
                transform: rotate(calc(var(--amp, 4) * -1deg))
            }

            50% {
                transform: rotate(calc(var(--amp, 4) * 1deg))
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0) rotate(0)
            }

            15% {
                transform: translateX(-6px) rotate(-8deg)
            }

            30% {
                transform: translateX(6px) rotate(8deg)
            }

            45% {
                transform: translateX(-5px) rotate(-6deg)
            }

            60% {
                transform: translateX(5px) rotate(6deg)
            }

            80% {
                transform: translateX(-3px) rotate(-3deg)
            }
        }

        .pot-svg {
            width: 100%;
            display: block;
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, .35))
        }

        /* Shards flying outward after break */
        .shard {
            position: absolute;
            pointer-events: none;
            z-index: 6;
            transform-origin: center;
            will-change: transform
        }

        /* Prize (toffee) revealed */
        .prize {
            position: absolute;
            font-size: 64px;
            pointer-events: none;
            z-index: 7;
            animation: prizeDrop 1.2s cubic-bezier(.5, 0, .7, 1) forwards
        }

        @keyframes prizeDrop {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(0);
                opacity: 0
            }

            20% {
                transform: translate(-50%, -30%) scale(1.4) rotate(-15deg);
                opacity: 1
            }

            100% {
                transform: translate(-50%, 60vh) scale(1) rotate(360deg);
                opacity: 1
            }
        }

        /* ---------- POPUP ---------- */
        .popup {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .55);
            backdrop-filter: blur(10px)
        }

        .popup.show {
            display: flex
        }

        .card {
            background: linear-gradient(145deg, #fff, #fff6e0);
            border: 3px solid rgba(217, 120, 39, .3);
            border-radius: 28px;
            padding: clamp(28px, 4vw, 42px);
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
            animation: popIn .4s cubic-bezier(.175, .885, .32, 1.275);
            color: #333
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.7)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .card .emoji {
            font-size: 72px;
            margin-bottom: 8px;
            line-height: 1
        }

        .card .title {
            font-family: 'Baloo 2', cursive;
            font-size: 44px;
            font-weight: 800;
            line-height: 1.1
        }

        .card .dt {
            font-size: 16px;
            color: #555;
            margin-top: 10px;
            font-weight: 600;
            line-height: 1.5
        }

        .btn {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            padding: 13px 30px;
            font-size: 15px;
            cursor: pointer;
            margin: 18px 6px 0;
            transition: .2s
        }

        .btn-p {
            background: linear-gradient(135deg, #d97827, #ffa94d);
            color: #fff;
            box-shadow: 0 4px 15px rgba(217, 120, 39, .4)
        }

        .btn-s {
            background: #eee;
            color: #555;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .1)
        }

        .btn:hover {
            transform: scale(1.05)
        }

        .tip {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 13px;
            color: #fff;
            background: rgba(0, 0, 0, .45);
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: 12px;
            padding: 8px 18px;
            backdrop-filter: blur(6px);
            animation: fadeUp .8s .5s both;
            font-weight: 600;
            white-space: nowrap;
            text-shadow: 0 1px 4px rgba(0, 0, 0, .3)
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0)
            }
        }

        .confetti {
            position: fixed;
            z-index: 55;
            pointer-events: none;
            animation: cfall var(--f, 3s) ease-in forwards
        }

        @keyframes cfall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0)
            }

            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(var(--r, 720deg))
            }
        }
    </style>
</head>

<body>
    <div class="sky"></div>
    <div class="sun"></div>

    <svg class="bunting" viewBox="0 0 1200 60" preserveAspectRatio="none">
        <path d="M0 10 Q300 50 600 10 T1200 10" stroke="#3a1e08" stroke-width="2" fill="none" />
        <g id="flags"></g>
    </svg>

    <svg class="trees-far" viewBox="0 0 1200 200" preserveAspectRatio="none">
        <path fill="#5a8a3a"
            d="M0 200 L0 140 Q30 100 60 120 T120 110 T180 130 T240 100 T300 120 T360 90 T420 115 T480 100 T540 125 T600 95 T660 115 T720 100 T780 120 T840 95 T900 110 T960 105 T1020 120 T1080 100 T1140 115 T1200 105 L1200 200 Z" />
    </svg>

    <div class="ground"></div>
    <div class="beam"></div>

    <a class="back" href="index.html">← Home</a>
    <div class="header">
        <h1>🏺 Kana Mutti Challenge 🍬</h1>
        <div class="sub">Break a pot to find the hidden toffee — only ONE holds the prize!</div>
    </div>

    <div class="scene" id="scene"></div>

    <div class="tip" id="tip">💡 Pick any pot — the toffee's location is a secret!</div>

    <div class="popup" id="pop">
        <div class="card">
            <div class="emoji" id="pE">🎉</div>
            <div class="title" id="pT">You Won!</div>
            <div class="dt" id="pD">You found the toffee!</div>
            <button class="btn btn-p" id="pBtryAgain">🔄 Try Again</button>
            <button class="btn btn-s" id="pBhome">🏠 Home</button>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const NUM_POTS = 5;
        let winnerIdx = -1, gameOver = false;

        // SVG pot template — orange terracotta clay with rope netting
        function potSVG(id) {
            return `
<svg class="pot-svg" viewBox="0 0 140 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pg${id}" cx="35%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#f5a657"/>
      <stop offset="35%" stop-color="#d97827"/>
      <stop offset="75%" stop-color="#a94d14"/>
      <stop offset="100%" stop-color="#6b2f08"/>
    </radialGradient>
    <linearGradient id="rm${id}" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c3712"/>
      <stop offset="100%" stop-color="#8b5a2b"/>
    </linearGradient>
  </defs>
  <g stroke="#6b4423" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="70" y1="0" x2="32" y2="80"/>
    <line x1="70" y1="0" x2="70" y2="72"/>
    <line x1="70" y1="0" x2="108" y2="80"/>
    <path d="M32 80 Q70 95 108 80" stroke-dasharray="4 3"/>
  </g>
  <ellipse cx="70" cy="78" rx="40" ry="10" fill="#3a1e08"/>
  <ellipse cx="70" cy="76" rx="36" ry="7" fill="#1a0a02"/>
  <path d="M 36 82 Q 20 90 18 120 Q 16 170 70 188 Q 124 170 122 120 Q 120 90 104 82 L 96 85 Q 108 92 110 120 Q 112 162 70 178 Q 28 162 30 120 Q 32 92 44 85 Z"
        fill="url(#pg${id})" stroke="#3a1e08" stroke-width="1.5"/>
  <ellipse cx="48" cy="110" rx="5" ry="18" fill="#fff" opacity="0.22"/>
  <ellipse cx="42" cy="135" rx="3" ry="10" fill="#fff" opacity="0.15"/>
  <path d="M 92 150 Q 100 160 96 172" stroke="#3a1e08" stroke-width="1" fill="none" opacity=".5"/>
  <path d="M 55 160 Q 60 168 58 175" stroke="#3a1e08" stroke-width="1" fill="none" opacity=".4"/>
  <rect x="67" y="78" width="6" height="14" fill="url(#rm${id})" rx="1"/>
</svg>`;
        }

        function buildPots() {
            scene.innerHTML = '';
            const swayParams = [
                { amp: 4, dur: 3.2, delay: 0 },
                { amp: 5, dur: 2.8, delay: -0.5 },
                { amp: 3.5, dur: 3.6, delay: -1.2 },
                { amp: 4.5, dur: 3.0, delay: -0.8 },
                { amp: 5.5, dur: 2.6, delay: -1.6 }
            ];
            // Shuffle sway parameters for unpredictability
            for (let i = swayParams.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [swayParams[i], swayParams[j]] = [swayParams[j], swayParams[i]];
            }
            for (let i = 0; i < NUM_POTS; i++) {
                const p = swayParams[i];
                const el = document.createElement('div');
                el.className = 'pot-hanger';
                el.style.setProperty('--amp', p.amp);
                el.style.setProperty('--dur', p.dur + 's');
                el.style.setProperty('--delay', p.delay + 's');
                el.innerHTML = potSVG(i);
                el.addEventListener('click', () => breakPot(el, i));
                scene.appendChild(el);
            }
            // Pick winning pot randomly AFTER building (invisible to player)
            winnerIdx = Math.floor(Math.random() * NUM_POTS);
            gameOver = false;
        }

        function breakPot(el, idx) {
            if (gameOver) return;
            gameOver = true;
            el.classList.add('shaking');

            // Freeze all other pots' swaying briefly for drama
            setTimeout(() => {
                // Get pot position before removing
                const rect = el.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height * 0.65;

                // Explode into shards
                el.classList.add('broken');
                el.querySelector('.pot-svg').style.display = 'none';
                createShards(cx, cy);

                // Reveal contents
                if (idx === winnerIdx) {
                    // Drop toffee!
                    const prize = document.createElement('div');
                    prize.className = 'prize';
                    prize.textContent = '🍬';
                    prize.style.left = cx + 'px';
                    prize.style.top = cy + 'px';
                    document.body.appendChild(prize);
                    setTimeout(() => showResult(true), 900);
                } else {
                    // Empty puff of dust
                    for (let i = 0; i < 8; i++) {
                        const d = document.createElement('div');
                        d.style.cssText = 'position:fixed;z-index:6;pointer-events:none;width:12px;height:12px;border-radius:50%;background:rgba(180,150,100,.6);';
                        d.style.left = cx + 'px'; d.style.top = cy + 'px';
                        document.body.appendChild(d);
                        const ang = Math.random() * Math.PI * 2, sp = 20 + Math.random() * 40;
                        d.animate([
                            { transform: 'translate(-50%,-50%) scale(1)', opacity: .8 },
                            { transform: `translate(calc(-50% + ${Math.cos(ang) * sp}px), calc(-50% + ${Math.sin(ang) * sp - 30}px)) scale(2)`, opacity: 0 }
                        ], { duration: 700, easing: 'ease-out', fill: 'forwards' });
                        setTimeout(() => d.remove(), 800);
                    }
                    setTimeout(() => showResult(false), 700);
                }
            }, 350);
        }

        function createShards(cx, cy) {
            const colors = ['#d97827', '#a94d14', '#6b2f08', '#f5a657', '#8b3c0c'];
            for (let i = 0; i < 14; i++) {
                const s = document.createElement('div');
                s.className = 'shard';
                const size = 10 + Math.random() * 18;
                s.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size * 0.7}px;background:${colors[~~(Math.random() * colors.length)]};border-radius:${Math.random() > .5 ? '40% 10% 30% 50%' : '10% 50% 20% 40%'};box-shadow:inset -2px -2px 4px rgba(0,0,0,.4);`;
                document.body.appendChild(s);
                const ang = Math.random() * Math.PI * 2;
                const vel = 120 + Math.random() * 180;
                const vx = Math.cos(ang) * vel;
                const vy = Math.sin(ang) * vel - 200;
                const dur = 900 + Math.random() * 400;
                const rot = (Math.random() - .5) * 1440;
                s.animate([
                    { transform: 'translate(-50%,-50%) rotate(0)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${vx}px), calc(-50% + ${vy + 400}px)) rotate(${rot}deg)`, opacity: 0 }
                ], { duration: dur, easing: 'cubic-bezier(.4,0,.7,1)', fill: 'forwards' });
                setTimeout(() => s.remove(), dur + 50);
            }
        }

        function showResult(won) {
            const pop = document.getElementById('pop');
            const e = document.getElementById('pE'), t = document.getElementById('pT'), dt = document.getElementById('pD');
            if (won) {
                e.textContent = '🎉'; t.textContent = 'You Won!'; t.style.color = '#2e7d32';
                dt.textContent = 'You found the toffee! Lucky break 🍬';
                confetti(); confetti();
            } else {
                e.textContent = '😅'; t.textContent = 'Empty!'; t.style.color = '#c62828';
                dt.textContent = 'No toffee this time. The prize was in a different pot!';
            }
            setTimeout(() => pop.classList.add('show'), 400);
        }

        document.getElementById('pBtryAgain').onclick = () => {
            document.getElementById('pop').classList.remove('show');
            document.querySelectorAll('.prize,.shard').forEach(n => n.remove());
            buildPots();
        };
        document.getElementById('pBhome').onclick = () => { window.location.href = 'index.html' };

        // Bunting flags
        const flagsG = document.getElementById('flags');
        const flagColors = ['#e74c3c', '#f39c12', '#27ae60', '#3498db', '#9b59b6', '#e67e22', '#f1c40f'];
        for (let i = 0; i <= 24; i++) {
            const x = i * 50;
            const y = 10 + Math.sin(i * 0.5) * 18;
            const c = flagColors[i % flagColors.length];
            flagsG.innerHTML += `<polygon points="${x - 8},${y} ${x + 8},${y} ${x},${y + 18}" fill="${c}" opacity="0.9"/>`;
        }

        function confetti() {
            const c = ['#fbbf24', '#f472b6', '#4CAF50', '#2196F3', '#f87171', '#d97827'];
            for (let i = 0; i < 45; i++) {
                const d = document.createElement('div');
                d.className = 'confetti';
                const s = Math.random() * 8 + 4;
                Object.assign(d.style, {
                    width: s + 'px', height: s * (Math.random() > .5 ? 1 : .5) + 'px',
                    background: c[~~(Math.random() * c.length)],
                    left: Math.random() * 100 + 'vw', top: '-10px',
                    borderRadius: Math.random() > .5 ? '50%' : '2px',
                    '--f': (2 + Math.random() * 2) + 's',
                    '--r': (360 + Math.random() * 720) + 'deg',
                    animationDelay: Math.random() * .5 + 's'
                });
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 4500);
            }
        }

        setTimeout(() => { document.getElementById('tip').style.opacity = '0'; document.getElementById('tip').style.transition = 'opacity 1s' }, 5000);
        buildPots();
    </script>
</body>

</html>
